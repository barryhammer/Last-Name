<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Last Entered Name</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      background-color: #f5f5f5;
    }

    .container {
      max-width: 500px;
      background: white;
      padding: 25px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h1 {
      margin-bottom: 20px;
    }

    input[type="text"] {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      margin-bottom: 15px;
      font-size: 16px;
      box-sizing: border-box;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      margin-bottom: 15px;
    }

    a {
      display: inline-block;
      margin-top: 10px;
      color: blue;
      text-decoration: underline;
      cursor: pointer;
    }

    .name-entry {
      margin-bottom: 10px;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>

  <!-- Home Page -->
  <div class="container" id="homePage">
    <h1>Last Entered Name</h1>

    <h2>Enter Your Name:</h2>

    <input
      type="text"
      id="nameInput"
      placeholder="Enter your name here"
    />

    <br />

    <button onclick="submitName()">Submit</button>

    <br />

    <a onclick="showResultsPage()">View Last Entered Name</a>
  </div>

  <!-- Results Page -->
  <div class="container hidden" id="resultsPage">
    <h1>Last Entered Name</h1>

    <div id="resultsContainer"></div>

    <a onclick="goHome()">Go back to home page</a>
  </div>

  <script>
    // Store names for current webpage session only
    const enteredNames = [];

    function submitName() {
      const input = document.getElementById("nameInput");
      const name = input.value.trim();

      if (name !== "") {
        const timestamp = new Date().toLocaleString();

        enteredNames.push({
          name: name,
          time: timestamp
        });

        input.value = "";
      }

      showResultsPage();
    }

    function showResultsPage() {
      const homePage = document.getElementById("homePage");
      const resultsPage = document.getElementById("resultsPage");
      const resultsContainer = document.getElementById("resultsContainer");

      resultsContainer.innerHTML = "";

      if (enteredNames.length === 0) {
        resultsContainer.innerHTML =
          "<p>No names have been entered yet.</p>";
      } else {
        enteredNames.forEach(entry => {
          const div = document.createElement("div");
          div.className = "name-entry";
          div.textContent = `${entry.name} - ${entry.time}`;
          resultsContainer.appendChild(div);
        });
      }

      homePage.classList.add("hidden");
      resultsPage.classList.remove("hidden");
    }

    function goHome() {
      const homePage = document.getElementById("homePage");
      const resultsPage = document.getElementById("resultsPage");

      resultsPage.classList.add("hidden");
      homePage.classList.remove("hidden");
    }
  </script>

</body>
</html>
